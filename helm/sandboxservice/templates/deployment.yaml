apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sandboxservice.fullname" . }}
  labels:
{{- include "sandboxservice.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
{{- include "sandboxservice.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
{{- include "sandboxservice.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: sandboxservice
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
{{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
{{- end }}