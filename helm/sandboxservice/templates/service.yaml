apiVersion: v1
kind: Service
metadata:
  name: {{ include "sandboxservice.fullname" . }}
  labels:
{{- include "sandboxservice.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
{{- include "sandboxservice.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}