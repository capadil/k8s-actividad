apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sandboxservice-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/capadil/k8s-actividad.git"
    targetRevision: main
    path: helm/sandboxservice
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: "https://kubernetes.default.svc"
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true